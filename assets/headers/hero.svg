<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <!-- Terminal chrome -->
  <rect width="840" height="400" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect width="840" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="840" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>
  <text x="420" y="23" text-anchor="middle" font-size="12" fill="#484f58">nutbits — node nutbits.js</text>

  <!-- ASCII logo -->
  <text x="40" y="78" font-size="16" font-weight="bold" fill="#c084fc" xml:space="preserve">  _   _ _   _ _____ _     _ _       </text>
  <text x="40" y="96" font-size="16" font-weight="bold" fill="#c084fc" xml:space="preserve"> | \ | | | | |_   _| |   (_) |_ ___ </text>
  <text x="40" y="114" font-size="16" font-weight="bold" fill="#c084fc" xml:space="preserve"> |  \| | | | | | | | |__ | | __/ __|</text>
  <text x="40" y="132" font-size="16" font-weight="bold" fill="#c084fc" xml:space="preserve"> | |\  | |_| | | | | '_ \| | |_\__ \</text>
  <text x="40" y="150" font-size="16" font-weight="bold" fill="#c084fc" xml:space="preserve"> |_| \_|\___/  |_| |_.__/|_|\__|___/</text>

  <!-- Taglines -->
  <text x="40" y="180" font-size="15" fill="#58a6ff">Cashu ecash to NWC bridge</text>
  <text x="40" y="200" font-size="13" fill="#8b949e">Use any Cashu mint as a Lightning funding source for LNbits</text>
  <text x="40" y="220" font-size="11" fill="#484f58">by DoktorShift  |  inspired by supertestnet/bankify</text>

  <!-- Separator -->
  <line x1="40" y1="238" x2="800" y2="238" stroke="#21262d" stroke-width="1"/>

  <!-- Status section -->
  <text x="40" y="264" font-size="12" fill="#8b949e">Mint</text>
  <text x="140" y="264" font-size="12" fill="#c9d1d9" font-weight="bold">Minibits mint</text>
  <text x="300" y="264" font-size="12" fill="#484f58">Nutshell/0.19.2</text>

  <text x="40" y="286" font-size="12" fill="#8b949e">Storage</text>
  <text x="140" y="286" font-size="12" fill="#c9d1d9">file</text>
  <text x="180" y="286" font-size="12" fill="#30363d">|</text>
  <text x="196" y="286" font-size="12" fill="#c9d1d9">sqlite</text>
  <text x="252" y="286" font-size="12" fill="#30363d">|</text>
  <text x="268" y="286" font-size="12" fill="#c9d1d9">mysql</text>

  <text x="40" y="308" font-size="12" fill="#8b949e">Seed</text>
  <text x="140" y="308" font-size="12" fill="#27c93f">configured</text>
  <text x="260" y="308" font-size="12" fill="#484f58">NUT-09 recovery ready</text>

  <text x="40" y="330" font-size="12" fill="#8b949e">NUTs</text>
  <text x="140" y="330" font-size="12" fill="#27c93f">00 01 02 03 04 05 06 07 08 09 12 13 17 20</text>

  <!-- Separator -->
  <line x1="40" y1="348" x2="800" y2="348" stroke="#21262d" stroke-width="1"/>

  <!-- Flow -->
  <text x="40"  y="374" font-size="12" fill="#8b949e">LNbits</text>
  <text x="100" y="374" font-size="12" fill="#c084fc">---NWC---></text>
  <text x="208" y="374" font-size="12" fill="#c9d1d9" font-weight="bold">NUTbits</text>
  <text x="290" y="374" font-size="12" fill="#ffbd2e">---NUTs---></text>
  <text x="410" y="374" font-size="12" fill="#8b949e">Mint</text>
  <text x="458" y="374" font-size="12" fill="#ff5f56">---Lightning---></text>
  <text x="620" y="374" font-size="12" fill="#8b949e">Network</text>

  <!-- Bottom accent -->
  <rect y="396" width="840" height="4" rx="0" fill="#c084fc"/>
</svg>
