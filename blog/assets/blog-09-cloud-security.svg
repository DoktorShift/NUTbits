<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="g10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent10" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5f56"/>
      <stop offset="50%" stop-color="#ffbd2e"/>
      <stop offset="100%" stop-color="#ff5f56"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#g10)"/>

  <!-- Title — left side -->
  <text x="80" y="160" font-size="42" fill="#c9d1d9" font-weight="bold">NUTbits Cloud</text>
  <text x="80" y="215" font-size="30" fill="#8b949e">Security Considerations</text>

  <text x="80" y="270" font-size="17" fill="#8b949e">Threat model for multi-tenant ecash hosting.</text>
  <text x="80" y="295" font-size="17" fill="#8b949e">What we protect, and what we can't.</text>

  <!-- Label badge -->
  <rect x="80" y="320" width="110" height="24" rx="4" fill="#21262d"/>
  <text x="135" y="337" text-anchor="middle" font-size="11" fill="#ff5f56">threat model</text>

  <!-- Visual — right side: layered defense diagram -->
  <!-- Outer boundary -->
  <rect x="680" y="150" width="440" height="340" rx="12" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="8,6"/>
  <text x="700" y="172" font-size="10" fill="#484f58">network boundary</text>

  <!-- Middle boundary -->
  <rect x="710" y="190" width="380" height="260" rx="10" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="730" y="210" font-size="10" fill="#484f58">encryption layer (AES-256-GCM)</text>

  <!-- Tenant boxes inside -->
  <rect x="740" y="230" width="150" height="70" rx="6" fill="#1a1e24" stroke="#ffbd2e" stroke-width="1.5"/>
  <text x="815" y="258" text-anchor="middle" font-size="12" fill="#ffbd2e" font-weight="bold">Tenant A</text>
  <text x="815" y="278" text-anchor="middle" font-size="10" fill="#484f58">proofs · keys · state</text>

  <rect x="910" y="230" width="150" height="70" rx="6" fill="#1a1e24" stroke="#ffbd2e" stroke-width="1.5"/>
  <text x="985" y="258" text-anchor="middle" font-size="12" fill="#ffbd2e" font-weight="bold">Tenant B</text>
  <text x="985" y="278" text-anchor="middle" font-size="10" fill="#484f58">proofs · keys · state</text>

  <!-- Isolation wall between tenants -->
  <line x1="900" y1="230" x2="900" y2="300" stroke="#ff5f56" stroke-width="2"/>
  <text x="900" y="320" text-anchor="middle" font-size="9" fill="#ff5f56">isolated</text>

  <!-- Threat arrows -->
  <line x1="660" y1="260" x2="710" y2="260" stroke="#ff5f56" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="650" y="255" text-anchor="end" font-size="10" fill="#ff5f56" opacity="0.7">malicious</text>
  <text x="650" y="268" text-anchor="end" font-size="10" fill="#ff5f56" opacity="0.7">mint</text>

  <line x1="660" y1="400" x2="710" y2="400" stroke="#ff5f56" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="650" y="395" text-anchor="end" font-size="10" fill="#ff5f56" opacity="0.7">operator</text>
  <text x="650" y="408" text-anchor="end" font-size="10" fill="#ff5f56" opacity="0.7">access</text>

  <!-- Operator box at bottom (can't see proofs) -->
  <rect x="740" y="360" width="320" height="60" rx="6" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="900" y="385" text-anchor="middle" font-size="12" fill="#8b949e">Platform Operator</text>
  <text x="900" y="405" text-anchor="middle" font-size="10" fill="#484f58">manages infra — cannot access proofs</text>

  <!-- Checklist — left side, below title -->
  <g transform="translate(80, 390)">
    <text x="0"  y="0"  font-size="13" fill="#27c93f">+</text>
    <text x="18" y="0"  font-size="13" fill="#8b949e">AES-256-GCM proof encryption at rest</text>
    <text x="0"  y="28" font-size="13" fill="#27c93f">+</text>
    <text x="18" y="28" font-size="13" fill="#8b949e">Per-tenant key derivation (scrypt)</text>
    <text x="0"  y="56" font-size="13" fill="#27c93f">+</text>
    <text x="18" y="56" font-size="13" fill="#8b949e">No operator access to ecash proofs</text>
    <text x="0"  y="84" font-size="13" fill="#27c93f">+</text>
    <text x="18" y="84" font-size="13" fill="#8b949e">Audit trail on all proof mutations</text>
    <text x="0"  y="112" font-size="13" fill="#27c93f">+</text>
    <text x="18" y="112" font-size="13" fill="#8b949e">Malicious mint blast radius contained</text>
  </g>

  <rect width="1200" height="4" fill="url(#accent10)"/>
  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#30363d" font-weight="bold">NUTbits</text>
</svg>
