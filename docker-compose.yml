services:
  nutbits:
    build: .
    restart: always
    env_file: .env
    volumes:
      - nutbits-data:/data
      - ./.env:/app/.env    # seed auto-saves back to .env
    ports:
      - "127.0.0.1:3338:3338"   # API  (loopback — use a reverse proxy for public access)
      - "127.0.0.1:8080:8080"   # GUI  (loopback — use a reverse proxy for public access)
    # CLI: docker compose exec nutbits nutbits

volumes:
  nutbits-data:
