<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1918"/>
      <stop offset="100%" stop-color="#0f0e0d"/>
    </linearGradient>
    <linearGradient id="bar11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow11">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.15"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252321"/>
      <stop offset="100%" stop-color="#1a1918"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#bg11)"/>
  <rect width="1200" height="4" fill="url(#bar11)"/>

  <!-- Visual: stacked wallet cards, right side, fanned out -->
  <g filter="url(#glow11)">

    <!-- Card 5 (back, most offset) -->
    <g transform="translate(720, 100) rotate(-3)">
      <rect width="380" height="96" rx="12" fill="url(#cardGrad)" stroke="#2a2827" stroke-width="1.5"/>
      <circle cx="32" cy="48" r="14" fill="#2a2827" stroke="#3a3735" stroke-width="1"/>
      <text cx="32" cy="48" x="32" y="53" text-anchor="middle" font-size="13" fill="#625a52">5</text>
      <rect x="60" y="28" width="120" height="10" rx="4" fill="#2a2827"/>
      <rect x="60" y="48" width="80" height="8" rx="4" fill="#252321"/>
      <text x="340" y="52" text-anchor="end" font-size="14" fill="#3a3735" font-weight="bold">···</text>
    </g>

    <!-- Card 4 -->
    <g transform="translate(710, 155) rotate(-1.5)">
      <rect width="380" height="96" rx="12" fill="url(#cardGrad)" stroke="#3a3735" stroke-width="1.5"/>
      <circle cx="32" cy="48" r="14" fill="#2a2827" stroke="#625a52" stroke-width="1"/>
      <text x="32" y="53" text-anchor="middle" font-size="13" fill="#8a8078">4</text>
      <rect x="60" y="28" width="140" height="10" rx="4" fill="#3a3735"/>
      <rect x="60" y="48" width="90" height="8" rx="4" fill="#2a2827"/>
      <text x="340" y="52" text-anchor="end" font-size="14" fill="#625a52" font-weight="bold">···</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(700, 215) rotate(0)">
      <rect width="380" height="96" rx="12" fill="url(#cardGrad)" stroke="#625a52" stroke-width="1.5"/>
      <circle cx="32" cy="48" r="14" fill="#3a3735" stroke="#8a8078" stroke-width="1"/>
      <text x="32" y="53" text-anchor="middle" font-size="13" fill="#a99f96">3</text>
      <rect x="60" y="30" width="100" height="11" rx="4" fill="#3a3735"/>
      <text x="60" y="58" font-size="11" fill="#625a52">12,400 sats</text>
      <text x="340" y="52" text-anchor="end" font-size="14" fill="#8a8078" font-weight="bold">···</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(690, 280) rotate(1)">
      <rect width="380" height="96" rx="12" fill="url(#cardGrad)" stroke="#8a8078" stroke-width="1.5"/>
      <circle cx="32" cy="48" r="14" fill="#3a3735" stroke="#a99f96" stroke-width="1"/>
      <text x="32" y="53" text-anchor="middle" font-size="13" fill="#c8beb4">2</text>
      <rect x="60" y="30" width="90" height="11" rx="4" fill="#625a52"/>
      <text x="60" y="58" font-size="11" fill="#8a8078">8,200 sats</text>
      <text x="340" y="52" text-anchor="end" font-size="14" fill="#a99f96" font-weight="bold">···</text>
    </g>

    <!-- Card 1 (front, full detail) -->
    <g transform="translate(680, 350) rotate(2)">
      <rect width="380" height="108" rx="12" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="32" cy="54" r="16" fill="#d97706" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="32" y="59" text-anchor="middle" font-size="14" fill="#0f0e0d" font-weight="bold">1</text>
      <text x="62" y="40" font-size="13" fill="#e8e0d8" font-weight="bold">wallet_alice</text>
      <text x="62" y="58" font-size="11" fill="#a99f96">alice@your-lnbits.com</text>
      <text x="62" y="80" font-size="18" fill="#f59e0b" font-weight="bold">45,800 sats</text>
      <circle cx="348" cy="54" r="6" fill="#34d399" opacity="0.8"/>
      <text x="348" y="78" text-anchor="middle" font-size="9" fill="#625a52">online</text>
    </g>

  </g>

  <!-- Title -->
  <text x="80" y="195" font-size="52" fill="#f5f0eb" font-weight="bold">A Wallet</text>
  <text x="80" y="263" font-size="52" fill="#f59e0b" font-weight="bold">for Your Group</text>

  <!-- Subtitle -->
  <text x="80" y="335" font-size="18" fill="#a99f96">One mint. One bridge.</text>
  <text x="80" y="363" font-size="18" fill="#a99f96">Everyone gets a wallet.</text>

  <!-- Key points -->
  <circle cx="100" cy="435" r="5" fill="#f59e0b"/>
  <text x="120" y="440" font-size="15" fill="#c8beb4">No signups. No KYC. No app store.</text>

  <circle cx="100" cy="471" r="5" fill="#f59e0b"/>
  <text x="120" y="476" font-size="15" fill="#c8beb4">One person runs it. Everyone benefits.</text>

  <circle cx="100" cy="507" r="5" fill="#f59e0b"/>
  <text x="120" y="512" font-size="15" fill="#c8beb4">Family. Friends. Meetup. Hackerspace.</text>

  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#3a3735" font-weight="bold">NUTbits</text>
</svg>
