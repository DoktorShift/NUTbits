<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180" fill="none">
  <rect width="840" height="180" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Time arrow -->
  <line x1="40" y1="155" x2="790" y2="155" stroke="#30363d" stroke-width="1"/>
  <polygon points="790,151 800,155 790,159" fill="#30363d"/>
