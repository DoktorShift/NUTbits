  <!-- Subtitle -->
  <text x="80" y="340" font-size="18" fill="#a99f96">You already own the infrastructure.</text>
  <text x="80" y="368" font-size="18" fill="#a99f96">NUTbits turns it into a platform.</text>

  <!-- Three key phrases -->
