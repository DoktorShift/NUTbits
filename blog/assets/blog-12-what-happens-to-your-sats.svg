<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1918"/>
      <stop offset="100%" stop-color="#0f0e0d"/>
    </linearGradient>
    <linearGradient id="bar12" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow12">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.15"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardGrad12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252321"/>
      <stop offset="100%" stop-color="#1a1918"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#bg12)"/>
  <rect width="1200" height="4" fill="url(#bar12)"/>

  <!-- Visual: four stacked step cards representing the payment flow -->
  <g filter="url(#glow12)">

    <!-- Card 4 (back) - Recipient receives -->
    <g transform="translate(700, 90) rotate(-2.5)">
      <rect width="400" height="88" rx="12" fill="url(#cardGrad12)" stroke="#2a2827" stroke-width="1.5"/>
      <text x="20" y="36" font-size="10" fill="#3a3735" font-weight="bold">STEP 4</text>
      <text x="20" y="56" font-size="14" fill="#3a3735">sats received</text>
      <circle cx="368" cy="44" r="10" fill="#1a1918" stroke="#2a2827" stroke-width="1"/>
      <text x="368" y="49" text-anchor="middle" font-size="12" fill="#3a3735">4</text>
    </g>

    <!-- Card 3 - Mint pays invoice -->
    <g transform="translate(695, 185) rotate(-1)">
      <rect width="400" height="88" rx="12" fill="url(#cardGrad12)" stroke="#3a3735" stroke-width="1.5"/>
      <text x="20" y="36" font-size="10" fill="#625a52" font-weight="bold">STEP 3</text>
      <text x="20" y="56" font-size="14" fill="#625a52">mint pays invoice</text>
      <rect x="200" y="28" width="100" height="8" rx="4" fill="#2a2827"/>
      <rect x="200" y="44" width="70" height="8" rx="4" fill="#252321"/>
      <circle cx="368" cy="44" r="10" fill="#1a1918" stroke="#625a52" stroke-width="1"/>
      <text x="368" y="49" text-anchor="middle" font-size="12" fill="#625a52">3</text>
    </g>

    <!-- Card 2 - NUTbits melts ecash -->
    <g transform="translate(690, 285) rotate(0.5)">
      <rect width="400" height="96" rx="12" fill="url(#cardGrad12)" stroke="#8a8078" stroke-width="1.5"/>
      <text x="20" y="36" font-size="10" fill="#8a8078" font-weight="bold">STEP 2</text>
      <text x="20" y="56" font-size="14" fill="#a99f96">NUTbits melts ecash</text>
      <text x="20" y="76" font-size="11" fill="#625a52">proofs destroyed, invoice forwarded</text>
      <circle cx="368" cy="48" r="12" fill="#1a1918" stroke="#a99f96" stroke-width="1"/>
      <text x="368" y="53" text-anchor="middle" font-size="13" fill="#a99f96">2</text>
    </g>

    <!-- Card 1 (front) - You hit send -->
    <g transform="translate(680, 395) rotate(1.5)">
      <rect width="400" height="110" rx="12" fill="url(#cardGrad12)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="20" y="34" font-size="10" fill="#d97706" font-weight="bold">STEP 1</text>
      <text x="20" y="56" font-size="15" fill="#e8e0d8" font-weight="bold">you hit send</text>
      <text x="20" y="76" font-size="12" fill="#a99f96">LNbits sends NWC request</text>

      <!-- Amount badge -->
      <rect x="240" y="30" width="140" height="36" rx="8" fill="#0f0e0d" stroke="#d97706" stroke-width="1"/>
      <text x="310" y="53" text-anchor="middle" font-size="16" fill="#f59e0b" font-weight="bold">1,000 sats</text>

      <!-- Status -->
      <circle cx="358" cy="86" r="6" fill="#34d399" opacity="0.8"/>
      <text x="340" y="90" text-anchor="end" font-size="10" fill="#625a52">paid</text>

      <!-- Time -->
      <text x="20" y="98" font-size="11" fill="#625a52">total: ~3 seconds</text>
    </g>

  </g>

  <!-- Title -->
  <text x="80" y="200" font-size="48" fill="#f5f0eb" font-weight="bold">What Happens</text>
  <text x="80" y="265" font-size="48" fill="#f59e0b" font-weight="bold">to Your Sats</text>

  <!-- Subtitle -->
  <text x="80" y="335" font-size="18" fill="#a99f96">One payment. Four steps.</text>
  <text x="80" y="363" font-size="18" fill="#a99f96">Nothing hidden.</text>

  <!-- Key points -->
  <circle cx="100" cy="440" r="5" fill="#f59e0b"/>
  <text x="120" y="445" font-size="15" fill="#c8beb4">Every sat is traceable by you.</text>

  <circle cx="100" cy="476" r="5" fill="#f59e0b"/>
  <text x="120" y="481" font-size="15" fill="#c8beb4">Invisible to everyone else.</text>

  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#3a3735" font-weight="bold">NUTbits</text>
</svg>
