<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" fill="none">
  <rect width="460" height="160" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Headers -->
  <text x="200" y="28" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Mint A</text>
  <text x="280" y="28" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Mint B</text>

  <!-- Row 1: Normal -->
  <text x="100" y="58" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Normal</text>
  <circle cx="200" cy="54" r="10" fill="#27c93f"/>
  <circle cx="280" cy="54" r="10" fill="#30363d"/>

  <!-- Row 2: Failover -->
  <text x="100" y="94" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Failover</text>
  <circle cx="200" cy="90" r="10" fill="#ff5f56"/>
  <circle cx="280" cy="90" r="10" fill="#27c93f"/>

  <!-- Row 3: Recovery -->
  <text x="100" y="130" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Recovery</text>
  <circle cx="200" cy="126" r="10" fill="#27c93f"/>
  <circle cx="280" cy="126" r="10" fill="#30363d"/>

  <!-- Message -->
  <text x="400" y="92" text-anchor="middle" font-family="monospace" font-size="10" fill="#c084fc">NWC string</text>
  <text x="400" y="106" text-anchor="middle" font-family="monospace" font-size="10" fill="#c084fc">never changes</text>
</svg>
