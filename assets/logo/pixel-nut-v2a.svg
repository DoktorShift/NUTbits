<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Pixel Nut v2a: "Glow Sprite"
    Warm pixel nut with ambient amber glow aura.
    Rich shading from cream highlights to deep brown shadows.
  -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.18" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#0f0e0d"/>

  <g filter="url(#glow)">
    <!-- Stem -->
    <rect x="226" y="72" width="28" height="28" rx="3" fill="#8a8078"/>
    <rect x="258" y="72" width="28" height="28" rx="3" fill="#625a52"/>

    <!-- Cap row — warm amber -->
    <rect x="194" y="104" width="28" height="28" rx="3" fill="#d97706"/>
    <rect x="226" y="104" width="28" height="28" rx="3" fill="#fbbf24"/>
    <rect x="258" y="104" width="28" height="28" rx="3" fill="#f59e0b"/>
    <rect x="290" y="104" width="28" height="28" rx="3" fill="#d97706"/>

    <!-- Body row 1 — top highlight -->
