<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 90" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <rect width="840" height="90" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- LNbits -->
  <rect x="20" y="24" width="110" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="50" text-anchor="middle" font-size="14" fill="#8b949e" font-weight="bold">LNbits</text>

  <!-- Arrow 1: NWC -->
  <line x1="135" y1="45" x2="215" y2="45" stroke="#c084fc" stroke-width="2"/>
  <polygon points="215,40 225,45 215,50" fill="#c084fc"/>
  <text x="175" y="35" text-anchor="middle" font-size="10" fill="#c084fc">NWC</text>

  <!-- NUTbits -->
  <rect x="230" y="24" width="120" height="42" rx="6" fill="#161b22" stroke="#c084fc" stroke-width="1.5"/>
  <text x="290" y="50" text-anchor="middle" font-size="14" fill="#c9d1d9" font-weight="bold">NUTbits</text>

  <!-- Arrow 2: Cashu NUTs -->
  <line x1="355" y1="45" x2="445" y2="45" stroke="#27c93f" stroke-width="2"/>
  <polygon points="445,40 455,45 445,50" fill="#27c93f"/>
  <text x="400" y="35" text-anchor="middle" font-size="10" fill="#27c93f">Cashu NUTs</text>

  <!-- Mint -->
  <rect x="460" y="24" width="100" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="510" y="50" text-anchor="middle" font-size="14" fill="#ffbd2e" font-weight="bold">Mint</text>

  <!-- Arrow 3: Lightning -->
  <line x1="565" y1="45" x2="660" y2="45" stroke="#ff5f56" stroke-width="2"/>
  <polygon points="660,40 670,45 660,50" fill="#ff5f56"/>
  <text x="615" y="35" text-anchor="middle" font-size="10" fill="#ff5f56">Lightning</text>

  <!-- Network -->
  <rect x="675" y="24" width="145" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="747" y="50" text-anchor="middle" font-size="14" fill="#8b949e" font-weight="bold">Network</text>
</svg>
