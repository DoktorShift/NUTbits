<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffbd2e"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#ffbd2e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#g2)"/>

  <!-- Visual: Rising bar chart / revenue growth -->
  <rect x="750" y="440" width="50" height="40" rx="4" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <rect x="820" y="400" width="50" height="80" rx="4" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <rect x="890" y="350" width="50" height="130" rx="4" fill="#1a1e24" stroke="#ffbd2e" stroke-width="1.5"/>
  <rect x="960" y="290" width="50" height="190" rx="4" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <rect x="1030" y="220" width="50" height="260" rx="4" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>

  <!-- Sat symbols on bars -->
  <text x="775" y="465" font-size="11" fill="#484f58">21</text>
  <text x="845" y="425" font-size="11" fill="#484f58">84</text>
  <text x="910" y="375" font-size="11" fill="#ffbd2e" font-weight="bold">210</text>
  <text x="980" y="315" font-size="11" fill="#484f58">441</text>
  <text x="1048" y="245" font-size="11" fill="#484f58">899</text>

  <!-- Baseline -->
  <line x1="730" y1="482" x2="1100" y2="482" stroke="#30363d" stroke-width="1"/>
  <text x="730" y="510" font-size="12" fill="#484f58">fee revenue (sats/day)</text>

  <!-- Title -->
  <text x="80" y="160" font-size="42" fill="#c9d1d9" font-weight="bold">Turn Your Cashu Mint</text>
  <text x="80" y="215" font-size="42" fill="#c9d1d9" font-weight="bold">Into a Revenue Stream</text>

  <!-- Subtitle -->
  <text x="80" y="265" font-size="17" fill="#8b949e">Transparent service fees on outgoing payments.</text>
  <text x="80" y="290" font-size="17" fill="#8b949e">Your infrastructure, your margin.</text>

  <!-- Fee example -->
  <rect x="80" y="340" width="440" height="90" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="370" font-size="13" fill="#484f58">1,000 sat payment  @  1% + 1 sat</text>
  <text x="100" y="395" font-size="13" fill="#8b949e">Invoice: 1,000  Fee: <tspan fill="#ffbd2e" font-weight="bold">11 sats</tspan>  Total: 1,011</text>
  <text x="100" y="418" font-size="12" fill="#484f58">fee stays as ecash in your balance</text>

  <rect width="1200" height="4" fill="url(#accent2)"/>
  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#30363d" font-weight="bold">NUTbits</text>
</svg>
