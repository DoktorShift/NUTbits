<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="gApp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/><stop offset="100%" stop-color="#141d2b"/>
    </linearGradient>
    <linearGradient id="gNut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#231a2e"/><stop offset="100%" stop-color="#1a1425"/>
    </linearGradient>
    <linearGradient id="gMint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2210"/><stop offset="100%" stop-color="#1f1a0e"/>
    </linearGradient>
    <linearGradient id="gNet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#261414"/><stop offset="100%" stop-color="#1c1010"/>
    </linearGradient>
  </defs>
  <rect width="840" height="200" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- ── Node 1: LNbits ── -->
  <rect x="30" y="40" width="160" height="72" rx="12" fill="url(#gApp)" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="110" y="72" text-anchor="middle" font-size="14" fill="#58a6ff" font-weight="bold">LNbits</text>
  <text x="110" y="92" text-anchor="middle" font-size="9" fill="#484f58">or any NWC client</text>

  <!-- Connector 1 -->
  <line x1="190" y1="76" x2="248" y2="76" stroke="#c084fc" stroke-width="1.5"/>
  <polygon points="244,71 256,76 244,81" fill="#c084fc"/>
  <text x="222" y="68" text-anchor="middle" font-size="8" fill="#c084fc">NWC</text>

  <!-- ── Node 2: NUTbits ── -->
  <rect x="256" y="40" width="160" height="72" rx="12" fill="url(#gNut)" stroke="#c084fc" stroke-width="1.2"/>
  <text x="336" y="72" text-anchor="middle" font-size="14" fill="#c084fc" font-weight="bold">NUTbits</text>
  <text x="336" y="92" text-anchor="middle" font-size="9" fill="#484f58">ecash to NWC bridge</text>

  <!-- Connector 2 -->
  <line x1="416" y1="76" x2="474" y2="76" stroke="#ffbd2e" stroke-width="1.5"/>
  <polygon points="470,71 482,76 470,81" fill="#ffbd2e"/>
  <text x="448" y="68" text-anchor="middle" font-size="8" fill="#ffbd2e">NUTs</text>

  <!-- ── Node 3: Cashu Mint ── -->
  <rect x="482" y="40" width="160" height="72" rx="12" fill="url(#gMint)" stroke="#ffbd2e" stroke-width="1.2"/>
  <text x="562" y="72" text-anchor="middle" font-size="14" fill="#ffbd2e" font-weight="bold">Cashu Mint</text>
  <text x="562" y="92" text-anchor="middle" font-size="9" fill="#484f58">ecash + Lightning</text>

  <!-- Connector 3 -->
  <line x1="642" y1="76" x2="700" y2="76" stroke="#ff5f56" stroke-width="1.5"/>
  <polygon points="696,71 708,76 696,81" fill="#ff5f56"/>
  <text x="674" y="68" text-anchor="middle" font-size="7" fill="#ff5f56">Lightning</text>

  <!-- ── Node 4: Network ── -->
  <rect x="708" y="40" width="102" height="72" rx="12" fill="url(#gNet)" stroke="#ff5f56" stroke-width="1.2"/>
  <text x="759" y="68" text-anchor="middle" font-size="11" fill="#ff5f56" font-weight="bold">Bitcoin</text>
  <text x="759" y="84" text-anchor="middle" font-size="11" fill="#ff5f56" font-weight="bold">Network</text>

  <!-- Summary line -->
  <text x="420" y="148" text-anchor="middle" font-size="12" fill="#8b949e">NUTbits connects LNbits to any Cashu mint —</text>
  <text x="420" y="166" text-anchor="middle" font-size="12" fill="#8b949e">unlocking ecash as a funding source for Lightning payments.</text>
</svg>
