<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="g9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent9" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#27c93f"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#g9)"/>

  <!-- Visual: Platform dashboard mockup -->
  <rect x="620" y="140" width="500" height="360" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="620" y="140" width="500" height="32" rx="10" fill="#1a1e24"/>
  <rect x="620" y="162" width="500" height="10" fill="#1a1e24"/>
  <circle cx="640" cy="156" r="5" fill="#ff5f56"/>
  <circle cx="656" cy="156" r="5" fill="#ffbd2e"/>
  <circle cx="672" cy="156" r="5" fill="#27c93f"/>
  <text x="870" y="160" text-anchor="middle" font-size="10" fill="#484f58">cloud.nutbits.dev</text>

  <!-- Dashboard content -->
  <text x="650" y="200" font-size="12" fill="#8b949e">My Bridges</text>

  <!-- Bridge card 1 -->
  <rect x="650" y="215" width="440" height="55" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="672" cy="242" r="5" fill="#27c93f"/>
  <text x="688" y="237" font-size="12" fill="#c9d1d9" font-weight="bold">mint.minibits.cash</text>
  <text x="688" y="255" font-size="10" fill="#484f58">3 connections · 12,450 sats</text>
  <text x="1060" y="247" text-anchor="end" font-size="10" fill="#27c93f">running</text>

  <!-- Bridge card 2 -->
  <rect x="650" y="280" width="440" height="55" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="672" cy="307" r="5" fill="#27c93f"/>
  <text x="688" y="302" font-size="12" fill="#c9d1d9" font-weight="bold">mint.coinos.io</text>
  <text x="688" y="320" font-size="10" fill="#484f58">1 connection · 890 sats</text>
  <text x="1060" y="312" text-anchor="end" font-size="10" fill="#27c93f">running</text>

  <!-- Bridge card 3 -->
  <rect x="650" y="345" width="440" height="55" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="672" cy="372" r="5" fill="#484f58"/>
  <text x="688" y="367" font-size="12" fill="#8b949e">my-private-mint.onion</text>
  <text x="688" y="385" font-size="10" fill="#484f58">0 connections · 0 sats</text>
  <text x="1060" y="377" text-anchor="end" font-size="10" fill="#484f58">paused</text>

  <!-- Add button -->
  <rect x="650" y="420" width="440" height="40" rx="6" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="870" y="445" text-anchor="middle" font-size="12" fill="#484f58">+ Add your mint</text>

  <!-- Revenue line -->
  <text x="650" y="485" font-size="11" fill="#484f58">Revenue this month:</text>
  <text x="840" y="485" font-size="11" fill="#ffbd2e" font-weight="bold">2,140 sats</text>

  <!-- Title -->
  <text x="80" y="180" font-size="42" fill="#c9d1d9" font-weight="bold">NUTbits Cloud</text>
  <text x="80" y="235" font-size="30" fill="#8b949e">The Platform Vision</text>

  <!-- Subtitle -->
  <text x="80" y="295" font-size="17" fill="#8b949e">Bring your mint. We run the bridge.</text>
  <text x="80" y="320" font-size="17" fill="#8b949e">Self-serve. No server needed.</text>
  <text x="80" y="345" font-size="17" fill="#8b949e">Pay per transaction.</text>

  <!-- Labels -->
  <rect x="80" y="390" width="80" height="24" rx="4" fill="#21262d"/>
  <text x="120" y="407" text-anchor="middle" font-size="11" fill="#58a6ff">concept</text>

  <rect width="1200" height="4" fill="url(#accent9)"/>
  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#30363d" font-weight="bold">NUTbits</text>
</svg>
