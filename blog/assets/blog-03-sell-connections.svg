<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#27c93f"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="12" fill="url(#g3)"/>

  <!-- Visual: Three product tier cards -->
  <rect x="700" y="160" width="130" height="180" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="765" y="195" text-anchor="middle" font-size="13" fill="#8b949e">STARTER</text>
  <text x="765" y="225" text-anchor="middle" font-size="22" fill="#c9d1d9" font-weight="bold">Free</text>
  <text x="765" y="255" text-anchor="middle" font-size="11" fill="#484f58">pay, balance</text>
  <text x="765" y="275" text-anchor="middle" font-size="11" fill="#484f58">1k sats/day</text>
  <rect x="725" y="300" width="80" height="24" rx="4" fill="#21262d"/>
  <text x="765" y="317" text-anchor="middle" font-size="11" fill="#8b949e">connect</text>

  <rect x="860" y="140" width="130" height="210" rx="8" fill="#1a1e24" stroke="#c084fc" stroke-width="1.5"/>
  <text x="925" y="175" text-anchor="middle" font-size="13" fill="#c084fc" font-weight="bold">PRO</text>
  <text x="925" y="210" text-anchor="middle" font-size="22" fill="#c9d1d9" font-weight="bold">1%</text>
  <text x="925" y="240" text-anchor="middle" font-size="11" fill="#8b949e">all permissions</text>
  <text x="925" y="260" text-anchor="middle" font-size="11" fill="#8b949e">50k sats/day</text>
  <text x="925" y="280" text-anchor="middle" font-size="11" fill="#484f58">priority relay</text>
  <rect x="885" y="310" width="80" height="24" rx="4" fill="#c084fc"/>
  <text x="925" y="327" text-anchor="middle" font-size="11" fill="#0d1117" font-weight="bold">connect</text>

  <rect x="1020" y="160" width="130" height="180" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="1085" y="195" text-anchor="middle" font-size="13" fill="#8b949e">API</text>
  <text x="1085" y="225" text-anchor="middle" font-size="22" fill="#c9d1d9" font-weight="bold">0.5%</text>
  <text x="1085" y="255" text-anchor="middle" font-size="11" fill="#484f58">pay only</text>
  <text x="1085" y="275" text-anchor="middle" font-size="11" fill="#484f58">no limit</text>
  <rect x="1045" y="300" width="80" height="24" rx="4" fill="#21262d"/>
  <text x="1085" y="317" text-anchor="middle" font-size="11" fill="#8b949e">connect</text>

  <!-- Title -->
  <text x="80" y="180" font-size="42" fill="#c9d1d9" font-weight="bold">Sell NWC Connections</text>
  <text x="80" y="235" font-size="42" fill="#c9d1d9" font-weight="bold">Like a Product</text>

  <!-- Subtitle -->
  <text x="80" y="290" font-size="17" fill="#8b949e">Package connections with tiered permissions,</text>
  <text x="80" y="315" font-size="17" fill="#8b949e">spending limits, and fee rates.</text>

  <!-- CLI example -->
  <rect x="80" y="370" width="520" height="80" rx="8" fill="#1a1e24" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="398" font-size="13" fill="#484f58">$</text>
  <text x="120" y="398" font-size="13" fill="#27c93f">nutbits connect</text>
  <text x="280" y="398" font-size="13" fill="#8b949e">--label "pro-tier"</text>
  <text x="120" y="422" font-size="13" fill="#8b949e">--fee-ppm 10000 --max-daily 50000</text>

  <rect width="1200" height="4" fill="url(#accent3)"/>
  <text x="1140" y="600" text-anchor="end" font-size="13" fill="#30363d" font-weight="bold">NUTbits</text>
</svg>
